<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="22" fill="#0f0f1a"/>
  <!-- Subtle inner border -->
  <rect x="2" y="2" width="124" height="124" rx="20" fill="none" stroke="#1e1e40" stroke-width="2"/>

  <!-- Iconoir-style scan corner brackets (blue) -->
  <!-- top-left -->
  <path d="M 20 40 L 20 20 L 40 20" fill="none" stroke="#3d7eff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- top-right -->
  <path d="M 88 20 L 108 20 L 108 40" fill="none" stroke="#3d7eff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom-left -->
  <path d="M 20 88 L 20 108 L 40 108" fill="none" stroke="#3d7eff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom-right -->
  <path d="M 88 108 L 108 108 L 108 88" fill="none" stroke="#3d7eff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor arrow (white, iconoir-style clean fill) -->
  <!-- Path: tip → down left side → inner notch → tail → tail right → inner right → body right → close -->
  <path d="M 38 26 L 38 72 L 46 63 L 53 80 L 59 77 L 52 60 L 64 60 Z"
        fill="#ffffff"/>

  <!-- Tiny selected-element hint: small dashed rect where cursor points -->
  <rect x="60" y="46" width="28" height="20" rx="4"
        fill="none" stroke="#3d7eff" stroke-width="2" stroke-dasharray="4 3" opacity="0.55"/>
</svg>
